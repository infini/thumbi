  <g filter="url(#cardShadow)">
    <g transform="rotate(8 560 446)">
      <rect x="342" y="262" width="344" height="344" rx="108" fill="url(#backCard)"/>
      <rect x="342.5" y="262.5" width="343" height="343" rx="107.5" stroke="white" stroke-opacity="0.56"/>
    </g>

    <g transform="rotate(-7 512 514)">
      <rect x="236" y="244" width="552" height="552" rx="170" fill="url(#frontCard)"/>
      <rect x="236.5" y="244.5" width="551" height="551" rx="169.5" stroke="white" stroke-opacity="0.72"/>
      <ellipse cx="512" cy="304" rx="214" ry="90" fill="white" fill-opacity="0.54"/>
      <circle cx="512" cy="530" r="136" fill="url(#ring)"/>
      <circle cx="512" cy="530" r="122" fill="white" fill-opacity="0.16"/>
