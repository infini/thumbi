<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backCard" x1="338" y1="250" x2="742" y2="676" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7FB" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#D8E9FF" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="frontCard" x1="252" y1="254" x2="780" y2="788" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#F4F8FF" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="ring" x1="408" y1="364" x2="640" y2="608" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.86"/>
      <stop offset="1" stop-color="white" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="mintBadge" x1="274" y1="658" x2="414" y2="792" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D1F8DD"/>
      <stop offset="1" stop-color="#72D79B"/>
    </linearGradient>
    <linearGradient id="peachBadge" x1="636" y1="246" x2="780" y2="378" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD9CF"/>
      <stop offset="1" stop-color="#EE967D"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF6C7"/>
      <stop offset="1" stop-color="#FFC66B"/>
    </linearGradient>
    <filter id="cardShadow" x="194" y="170" width="650" height="686" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#7183A0" flood-opacity="0.16"/>
    </filter>
    <filter id="badgeShadow" x="198" y="200" width="644" height="626" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#8090AA" flood-opacity="0.16"/>
    </filter>
    <filter id="softGlow" x="356" y="316" width="316" height="316" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
