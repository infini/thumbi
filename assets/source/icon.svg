    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(786 818) rotate(-148) scale(334 296)">
      <stop stop-color="#AECFFF"/>
