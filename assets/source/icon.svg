      <stop offset="1" stop-color="#D8E7FF"/>
    </linearGradient>
    <radialGradient id="peachGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(264 214) rotate(41) scale(284)">
      <stop stop-color="#FFBEA8"/>
