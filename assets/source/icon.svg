<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="108" y1="96" x2="916" y2="924" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF3E1"/>
